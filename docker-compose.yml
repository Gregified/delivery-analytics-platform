services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ordersdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-ordersdb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  orders_service:
    build:
      context: .
      dockerfile: Dockerfile.orders
    env_file:
      - .env
    environment:
      # Container-to-container: use service DNS name, not localhost.
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ordersdb}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # TCP-level check (doesn't require API key).
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  analytics_service:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    env_file:
      - .env
    environment:
      # Container-to-container: use service DNS name, not localhost.
      ORDERS_API_URL: http://orders_service:8000/orders
    ports:
      - "8001:8001"
    depends_on:
      orders_service:
        condition: service_healthy
    healthcheck:
      # TCP-level check (doesn't require API key).
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8001),2); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Gateway must be configured via process env (it does not read .env itself).
      ORDERS_UPSTREAM_URL: http://orders_service:8000
      ANALYTICS_UPSTREAM_URL: http://analytics_service:8001
    ports:
      - "8080:8080"
    depends_on:
      orders_service:
        condition: service_healthy
      analytics_service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
